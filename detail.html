<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhes - Sistema dos Deuses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;700;800&family=Teko:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #07192f;
      --bg-2: #153a62;
      --ink: #eaf2ff;
      --muted: #b6c8df;
      --line: rgba(0, 213, 255, 0.7);
      --panel: rgba(11, 31, 56, 0.82);
      --panel-strong: rgba(12, 34, 61, 0.94);
      --dock-bg: rgba(8, 24, 44, 0.88);
      --accent-soft: #ffc14f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Raleway", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(94, 196, 255, 0.2), transparent 30%),
        radial-gradient(circle at 90% 0%, rgba(8, 255, 206, 0.15), transparent 22%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 0.65rem;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      backdrop-filter: blur(10px);
    }

    .icon-btn {
      pointer-events: auto;
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.12);
      color: #ffe17a;
      font-size: 1.35rem;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
    }

    .hero {
      max-width: 1040px;
      margin: 0 auto;
      padding: 3.5rem 1rem 1.5rem;
      text-align: center;
    }

    .hero h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 800;
      color: #ffd8ff;
      text-shadow: 0 0 8px #ff4ff3, 0 0 22px #b000ff;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      line-height: 1.45;
    }

    .content {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 1rem 1.5rem;
      display: grid;
      gap: 1rem;
    }

    .panel {
      border-radius: 18px;
      border: 1px solid rgba(0, 213, 255, 0.38);
      background: var(--panel);
      box-shadow: 0 18px 28px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .panel__hero {
      min-height: 200px;
      padding: 1.25rem;
      display: grid;
      gap: 0.6rem;
      align-content: end;
      background:
        radial-gradient(circle at top right, var(--card-glow, rgba(0, 213, 255, 0.18)), transparent 55%),
        linear-gradient(160deg, var(--card-start, #11294a), var(--card-mid, #1b3b68) 55%, var(--card-end, #08101d));
    }

    .tag {
      display: inline-flex;
      width: fit-content;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.92);
    }

    .panel__hero h2 {
      margin: 0;
      font-family: "Teko", sans-serif;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 0.95;
      color: #fff9f0;
    }

    .panel__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.95rem;
    }

    .panel__body {
      padding: 1rem;
      background: var(--panel-strong);
      display: grid;
      gap: 1rem;
    }

    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr;
    }

    .field {
      display: grid;
      gap: 0.3rem;
    }

    .field label {
      font-weight: 800;
      color: #f3f8ff;
    }

    .value {
      padding: 0.75rem 0.85rem;
      border-radius: 12px;
      border: 1px solid rgba(0, 213, 255, 0.35);
      background: rgba(255, 255, 255, 0.08);
      color: #eef5ff;
      line-height: 1.45;
      min-height: 2.8rem;
    }

    .summary {
      padding: 0.95rem;
      border-radius: 14px;
      border: 1px solid rgba(0, 213, 255, 0.35);
      background: rgba(255, 255, 255, 0.08);
      color: #eef5ff;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .action-btn,
    .action-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0.45rem 0.9rem;
      border-radius: 10px;
      border: 0;
      background: linear-gradient(135deg, #d85c37, #a33d24);
      color: #fff8f2;
      text-decoration: none;
      font-weight: 800;
      cursor: pointer;
    }

    .action-link.alt {
      background: linear-gradient(135deg, #5e6c84, #435063);
    }

    .dock {
      border-top: 1px solid rgba(0, 213, 255, 0.55);
      background: var(--dock-bg);
      padding: 0.8rem 0.7rem;
    }

    .dock-grid {
      max-width: 1040px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 0.55rem;
    }

    .dock-link {
      text-decoration: none;
      color: #dbecff;
      background: rgba(20, 56, 88, 0.9);
      border: 2px solid rgba(0, 213, 255, 0.55);
      border-radius: 10px;
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Teko", sans-serif;
      font-size: 1.33rem;
      letter-spacing: 0.03em;
      transition: transform 120ms ease, background-color 120ms ease;
    }

    .dock-link:hover {
      transform: translateY(-2px);
      background: rgba(29, 75, 116, 0.95);
    }

    .dock-link.primary {
      border-color: #ffc14f;
      color: #ffe6b0;
      box-shadow: 0 0 12px rgba(255, 193, 79, 0.35);
    }

    @media (min-width: 900px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top-bar">
      <button class="icon-btn" type="button" aria-label="Menu">☰</button>
      <button class="icon-btn" type="button" aria-label="Modo">🌙</button>
    </header>

    <main>
      <section class="hero">
        <h1 id="detailTitle">Carregando...</h1>
        <p id="detailSubtitle">Buscando informações detalhadas no JSON.</p>
      </section>

      <section class="content">
        <article class="panel">
          <div id="detailHero" class="panel__hero">
            <span class="tag" id="detailTag">Detalhe</span>
            <h2 id="detailName">-</h2>
            <div class="panel__meta" id="detailMeta"></div>
          </div>
          <div class="panel__body">
            <div class="grid">
              <div class="field">
                <label>Resumo</label>
                <div id="detailSummary" class="summary"></div>
              </div>
              <div class="field">
                <label>Informações</label>
                <div id="detailInfo" class="value"></div>
              </div>
            </div>
            <div class="actions">
              <button id="selectButton" class="action-btn" type="button">Usar na ficha</button>
              <a class="action-link alt" href="index.html">Voltar à home</a>
              <a id="relatedLink" class="action-link" href="#">Abrir lista</a>
            </div>
          </div>
        </article>
      </section>
    </main>

    <nav class="dock" aria-label="Atalhos do sistema">
      <div class="dock-grid">
        <a class="dock-link primary" href="ficha.html">Ficha</a>
        <a class="dock-link" href="personagens.html">Personagens</a>
        <a class="dock-link" href="index.html">Home</a>
        <a class="dock-link" href="races.html">Raças</a>
        <a class="dock-link" href="origens.html">Origens</a>
      </div>
    </nav>
  </div>

  <script src="detail.js"></script>
</body>
</html>
