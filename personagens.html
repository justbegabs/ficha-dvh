<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personagens - Sistema dos Deuses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;700;800&family=Teko:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #07192f;
      --bg-2: #153a62;
      --ink: #eaf2ff;
      --muted: #b6c8df;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Raleway", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(94, 196, 255, 0.2), transparent 30%),
        radial-gradient(circle at 90% 0%, rgba(8, 255, 206, 0.15), transparent 22%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 0.65rem;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      backdrop-filter: blur(10px);
    }

    .icon-btn {
      pointer-events: auto;
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.12);
      color: #ffe17a;
      font-size: 1.35rem;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
      cursor: pointer;
    }

    main {
      max-width: 1040px;
      width: 100%;
      margin: 0 auto;
      padding: 1.2rem 1rem 1.4rem;
    }

    .hero {
      text-align: center;
      margin-bottom: 1rem;
    }

    .hero h1 {
      margin: 0 0 0.55rem;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 800;
      color: #ffd8ff;
      text-shadow: 0 0 8px #ff4ff3, 0 0 22px #b000ff;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.2rem);
    }

    .panel {
      border: 2px solid rgba(255, 193, 79, 0.45);
      border-radius: 14px;
      background: rgba(8, 24, 44, 0.82);
      padding: 1rem;
      box-shadow: 0 0 18px rgba(255, 193, 79, 0.18);
    }

    .panel__header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }

    .panel__header h2 {
      margin: 0;
      font-family: "Teko", sans-serif;
      letter-spacing: 0.02em;
      font-size: clamp(1.7rem, 3vw, 2.1rem);
      color: #ffe6b0;
    }

    .status {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .characters-grid {
      display: grid;
      gap: 0.65rem;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    }

    .character-card {
      border: 1px solid rgba(255, 193, 79, 0.35);
      border-radius: 12px;
      background: rgba(11, 31, 56, 0.9);
      padding: 0.7rem;
      display: grid;
      gap: 0.45rem;
    }

    .character-card strong {
      font-family: "Teko", sans-serif;
      font-size: 1.45rem;
      letter-spacing: 0.02em;
      color: #ffe6b0;
      line-height: 1;
    }

    .character-meta {
      color: #d4e1f3;
      font-size: 0.84rem;
      line-height: 1.35;
    }

    .character-actions {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
    }

    .character-action {
      flex: 1 1 0;
      border: 1px solid rgba(0, 213, 255, 0.45);
      border-radius: 8px;
      background: rgba(20, 56, 88, 0.88);
      color: #eaf2ff;
      min-height: 34px;
      font-family: "Raleway", sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
    }

    .character-action.is-danger {
      border-color: rgba(255, 106, 106, 0.42);
      color: #ffd6d6;
      background: rgba(91, 26, 26, 0.78);
    }

    .menu-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      z-index: 18;
    }

    .menu-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .side-menu {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: min(88vw, 320px);
      padding: 1rem;
      background: rgba(7, 22, 39, 0.98);
      border-right: 1px solid rgba(0, 213, 255, 0.35);
      box-shadow: 18px 0 36px rgba(0, 0, 0, 0.35);
      transform: translateX(-102%);
      transition: transform 180ms ease;
      z-index: 20;
      overflow-y: auto;
    }

    .side-menu.is-open {
      transform: translateX(0);
    }

    .side-menu__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .side-menu__header h2 {
      margin: 0;
      font-family: "Teko", sans-serif;
      font-size: 2rem;
      color: #ffe6b0;
    }

    .side-menu__close {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 0;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .side-menu__links {
      display: grid;
      gap: 0.55rem;
    }

    .side-menu__link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      text-decoration: none;
      color: #dbecff;
      background: rgba(20, 56, 88, 0.88);
      border: 1px solid rgba(0, 213, 255, 0.35);
      border-radius: 12px;
      padding: 0.8rem 0.9rem;
      font-family: "Teko", sans-serif;
      font-size: 1.25rem;
      letter-spacing: 0.03em;
    }

    .side-menu__link small {
      font-family: "Raleway", sans-serif;
      font-size: 0.82rem;
      color: rgba(234, 242, 255, 0.72);
    }

    @media (max-width: 640px) {
      .panel__header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top-bar">
      <button class="icon-btn" type="button" aria-label="Menu">☰</button>
      <button class="icon-btn" type="button" aria-label="Modo">🌙</button>
    </header>

    <main>
      <section class="hero">
        <h1>Personagens Salvos</h1>
        <p>Todos os personagens salvos no site ficam organizados nesta área.</p>
      </section>

      <section class="panel" aria-label="Lista de personagens salvos">
        <div class="panel__header">
          <h2>Personagens</h2>
          <p id="charactersStatus" class="status">Carregando personagens...</p>
        </div>
        <div id="charactersGrid" class="characters-grid"></div>
      </section>
    </main>

    <div id="menuOverlay" class="menu-overlay" hidden></div>
    <aside id="sideMenu" class="side-menu" aria-label="Menu lateral" aria-hidden="true">
      <div class="side-menu__header">
        <h2>Menu</h2>
        <button id="menuClose" class="side-menu__close" type="button" aria-label="Fechar menu">✕</button>
      </div>
      <div class="side-menu__links">
        <a class="side-menu__link" href="index.html"><span>Home</span><small>Página inicial</small></a>
        <a class="side-menu__link" href="#charactersGrid"><span>Personagens</span><small>Página atual</small></a>
        <a class="side-menu__link" href="races.html"><span>Raças</span><small>Ver detalhes</small></a>
        <a class="side-menu__link" href="classes.html"><span>Classes</span><small>Ver detalhes</small></a>
        <a class="side-menu__link" href="ficha.html"><span>Ficha</span><small>Abrir personagem</small></a>
        <a class="side-menu__link" href="origens.html"><span>Origens</span><small>Ver detalhes</small></a>
      </div>
    </aside>
  </div>

  <script src="personagens.js"></script>
</body>
</html>
